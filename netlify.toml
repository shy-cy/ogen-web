# Static site — no build step. Pretty URLs let /en/about resolve to
# /en/about.html and strip trailing .html.
[build]
  publish = "."

[build.processing.html]
  pretty_urls = true

# Basic security + caching headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Serve the localized 404 for unknown paths.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
